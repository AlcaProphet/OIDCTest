name: Create Release Archive

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（留空则自动计算下一个版本）'
        required: false
        default: ''

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 确定版本号
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            # 手动触发时使用输入的版本号
            TAG="v${{ github.event.inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            # 标签触发时使用当前标签
            TAG="${{ github.ref_name }}"
          else
            # 自动计算下一个版本号
            LATEST=$(git tag --sort=-v:refname | grep '^v[0-9]' | head -1 | sed 's/^v//')
            if [ -z "$LATEST" ]; then
              NEXT="1.0"
            else
              MAJOR=$(echo "$LATEST" | cut -d. -f1)
              MINOR=$(echo "$LATEST" | cut -d. -f2)
              NEXT="$MAJOR.$((MINOR + 1))"
            fi
            TAG="v$NEXT"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "版本号: $TAG"

      - name: 创建并推送标签（仅手动触发时）
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: 打包部署文件
        run: |
          mkdir -p release/KyleworksOidcTest
          cp Dockerfile docker-compose.yml go.mod go.sum .gitignore release/KyleworksOidcTest/
          cp main.go oidc.go store.go release/KyleworksOidcTest/
          cp -r templates release/KyleworksOidcTest/
          cd release
          tar -czf KyleworksOidcTest.tar.gz KyleworksOidcTest/

      - name: 创建 Release 并上传
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: release/KyleworksOidcTest.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
