name: Create Release Archive

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（留空则自动计算）'
        required: false
        default: ''

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 确定版本号
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            # 手动触发且填写了版本号
            TAG="v${{ github.event.inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            # 推送标签触发：直接使用该标签
            TAG="${{ github.ref_name }}"
          else
            # 推送 main 或手动触发未填版本号：自动 patch +1
            LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 | sed 's/^v//')
            if [ -z "$LATEST" ]; then
              NEXT="2.0.0"
            else
              MAJOR=$(echo "$LATEST" | cut -d. -f1)
              MINOR=$(echo "$LATEST" | cut -d. -f2)
              PATCH=$(echo "$LATEST" | cut -d. -f3)
              NEXT="$MAJOR.$MINOR.$((PATCH + 1))"
            fi
            TAG="v$NEXT"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "版本号: $TAG"

      - name: 创建并推送标签
        if: github.ref_type != 'tag'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: 打包部署文件
        run: |
          mkdir -p release/KyleworksOidcTest
          cp Dockerfile docker-compose.yml go.mod go.sum .gitignore release/KyleworksOidcTest/
          cp main.go oidc.go store.go release/KyleworksOidcTest/
          cp -r templates release/KyleworksOidcTest/
          cd release
          tar -czf KyleworksOidcTest.tar.gz KyleworksOidcTest/

      - name: 创建 Release 并上传
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: release/KyleworksOidcTest.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
